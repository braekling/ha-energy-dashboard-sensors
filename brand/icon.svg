<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1FB57A"/>
      <stop offset="0.55" stop-color="#1E9E8A"/>
      <stop offset="1" stop-color="#2E7DD1"/>
    </linearGradient>
    <linearGradient id="bolt" x1="200" y1="150" x2="320" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EAF6FF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0A3D33" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- rounded app-icon background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- gauge arc (track) -->
  <path d="M 128 320 A 128 128 0 1 1 384 320"
        stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="34" stroke-linecap="round" fill="none"/>
  <!-- gauge arc (value, ~82%) -->
  <path d="M 128 320 A 128 128 0 1 1 372 268"
        stroke="#EAFBE9" stroke-width="34" stroke-linecap="round" fill="none"/>

  <!-- lightning bolt -->
  <path filter="url(#soft)" fill="url(#bolt)"
        d="M 281 150 L 196 290 L 248 290 L 226 392 L 322 244 L 266 244 Z"/>

  <!-- leaf accent -->
  <g transform="rotate(22 372 214)">
    <path fill="#BFF3C9"
          d="M 372 168 C 410 196 410 232 372 260 C 334 232 334 196 372 168 Z"/>
    <path stroke="#1E9E8A" stroke-width="6" stroke-linecap="round"
          d="M 372 178 L 372 250"/>
  </g>
</svg>
